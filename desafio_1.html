<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <label for="nome">Nome Completo</label>
      <input type="text" id="nome" name="nome" /><br />

      <label for="email">E-mail:</label>
      <input type="email" name="email" id="email" /><br />

      <label for="idade">Idade</label>
      <input type="number" name="idade" id="idade" /><br />

      <label for="materia"
        >Para qual matéria você está se candidatando para lecionar:</label
      >
      <select name="materia" id="materia">
        <option value="matematica">Matemática</option>
        <option value="portugues">Português</option>
        <option value="biologia">Biologia</option>
        <option value="ciencias">Ciências</option>
        <option value="historia">História</option>
        <option value="geografia">Geografia</option>
        <option value="artes">Artes</option></select
      ><br />

      <p for="turno">Turnos disponiveis:</p>

      <label for="matutino">Matutino</label>
      <input type="checkbox" name="matutino" id="matutino" /><br />

      <label for="vespertino">Vespertino</label>
      <input type="checkbox" name="vespertino" id="vespertino" /><br />
      <label for="noturno">Noturno</label>
      <input type="checkbox" name="noturno" id="noturno" /><br />

      <label for="escolaridade">Nivel de escolaridade</label><br />

      <select name="escolaridade" id="escolaridade">
        <option value="superiorcompleto">Ensino Superior Completo</option>
        <option value="cursandomestrado">Cursando Mestrado</option>
        <option value="mestradocompleto">Mestrado Completo</option>
        <option value="cursandodoutorado">Cursando Doutorado</option>
        <option value="doutoradocompleto">Doutorado Completo</option></select
      ><br />
      <label for="sobre">Sobre si mesmo</label><br />
      <textarea name="sobre" id="sobre" cols="30" rows="10"></textarea>
    </form>
  </body>
</html>
